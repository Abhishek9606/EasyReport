<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | EasyReport</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container animate-fade-in">
        <nav>
            <a href="index.html" class="logo">
                <span class="logo-icon">📄</span> EasyReport
            </a>
            <div class="nav-links">
                <a href="student.html" class="active">Student Portal</a>
                <a href="faculty.html">Faculty Portal</a>
            </div>
        </nav>

        <header class="mb-4">
            <h1>Student Dashboard</h1>
            <p>View assignments, read the rules, and submit your reports.</p>
        </header>

        <div id="assignments-list" class="grid-2">
            <!-- Assignments will be loaded here via JS -->
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Upload Report</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="upload-form">
                <input type="hidden" id="assignment-id">
                <div class="form-group">
                    <label for="student-name">Student Name(s) (Comma separated for group)</label>
                    <input type="text" id="student-name" required placeholder="e.g. John Doe, Jane Smith">
                </div>
                <div class="form-group">
                    <label for="student-usn">USN(s) (Comma separated)</label>
                    <input type="text" id="student-usn" required placeholder="e.g. 1KS24CS003, 1KS24CS004">
                </div>
                <div class="form-group">
                    <label for="report-file">Report File (PDF/DOCX)</label>
                    <input type="file" id="report-file" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Submit Report</button>
            </form>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
